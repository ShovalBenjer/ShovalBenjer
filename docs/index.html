<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoval Benjer — Portfolio</title>
  <meta name="description" content="Portfolio of Shoval Benjer — Data Engineering & AI projects">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0d1117; --card: #151b23; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --accent2: #a371f7; --border: #21262d; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; line-height: 1.6; min-height: 100vh; display: flex; justify-content: center; padding: 4rem 2rem; }
    main { max-width: 800px; width: 100%; }
    h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem; text-align: center; }
    .subtitle { text-align: center; color: var(--muted); font-size: 1.1rem; margin-bottom: 2rem; }
    .muted { color: var(--muted); font-size: 0.9rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .demo {
      display: inline-block; margin: 2rem 0; padding: 1rem 2rem; background: var(--accent);
      color: white; font-weight: 600; border-radius: 8px; text-decoration: none;
    }
    footer { margin-top: 3rem; text-align: center; color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>
<main>
  <h1>Shoval Benjer</h1>
  <p class="subtitle">Solution Engineer · Data & AI Projects</p>

  <div align="center">
    <a href="https://github.com/ShovalBenjer" class="demo">View GitHub Profile →</a>
  </div>

  <p class="muted" style="text-align: center; margin-top: 1rem;">
    Live demo: <a href="https://admaven-demo.fly.dev/" target="_blank">AdMaven ETL Dashboard</a>
  </p>

  <footer>
    Portfolio powered by <a href="https://pages.github.com/">GitHub Pages</a><br>
    Demo hosted on <a href="https://fly.io">Fly.io</a>
  </footer>
</main>
</body>
</html>
